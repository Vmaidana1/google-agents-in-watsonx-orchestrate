spec_version: v1
kind: external
name: deal_desk_cpq_agent_google
display_name: Deal Desk & CPQ Agent (Google ADK)
title: Deal Desk & CPQ Agent
description: |
  Strict financial deal desk analyst responsible for deterministic pricing calculations. This agent performs 
  Configure, Price, Quote (CPQ) calculations using approved business rules, discount structures, and contract 
  terms. Powered by Google ADK and integrated via A2A protocol.

# External agent configuration for A2A integration
provider: external_chat/A2A/0.3.0
api_url: https://YOUR-TUNNEL-URL-HERE.trycloudflare.com/agent/chat

# Authentication (if needed - adjust based on your setup)
# For local development, no auth is typically needed
# For production, you would configure appropriate authentication
auth_scheme: NONE

# Chat parameters for A2A protocol
chat_params:
  stream: false
  sendHistory: true
  pushNotifications: false

# Agent instructions for the watsonx Orchestrate orchestrator
# This helps the parent agent understand how to interact with this external agent
instructions: |
  This is an external agent powered by Google ADK that performs CPQ (Configure, Price, Quote) calculations.
  
  **When to delegate to this agent:**
  - When you need to calculate final pricing with MSA discounts
  - When you need to apply term-length discount kickers
  - When you need to determine if NRC should be waived
  - When you need Total Contract Value (TCV) calculations
  
  **Required inputs to provide:**
  Provide the agent with these exact parameters in your delegation message:
  - base_mrc: Base Monthly Recurring Charge (from Network Serviceability Agent)
  - base_nrc: Base Non-Recurring Charge (from Network Serviceability Agent)
  - discount_percentage: MSA discount percentage (from Salesforce)
  - contract_term_months: Contract length in months (default: 36)
  
  **Example delegation:**
  "Calculate quote with base MRC $1000, base NRC $500, MSA discount 20%, 36-month term"
  
  **What this agent returns:**
  - final_mrc: Final monthly recurring charge
  - final_nrc: Final non-recurring charge (may be $0 if waived)
  - total_contract_value_tcv: Total contract value
  - annual_savings: Annual savings vs. base pricing
  - total_applied_discount: Total discount percentage
  - nrc_waived_due_to_term: Whether installation fees were waived
  
  **Important:**
  - This agent uses deterministic calculations - same inputs always produce same outputs
  - Never modify the numbers returned by this agent
  - The agent automatically applies 36-month term promotions (5% extra discount + NRC waiver)

tags:
  - cpq
  - pricing
  - financial
  - google-adk
  - a2a

# Configuration options
config:
  hidden: false
  enable_cot: false

